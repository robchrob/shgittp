# shgittp v0.4.12 Configuration
# Location: ~/.config/shgittp/config

# Repository URL
# Must be SSH (git@...) or HTTPS (https://...)
REPO_URL=""
BRANCH=develop
DOTFILES_DIR=".dot"
BACKUP_DIR_PREFIX=".dot-backup"
TARGET_WORK_TREE=""

[dev@devbox]
REPO_URL="git@github.com:robchrob/dotfiles-bare.git"
BRANCH=minimal
DOTFILES_DIR=".dot"
BACKUP_DIR_PREFIX=".dot-backup"

[endpoint]
REPO_URL="git@github.com:robchrob/dotfiles-bare.git"
BRANCH=minimal
DOTFILES_DIR=".dot"
BACKUP_DIR_PREFIX=".dot-backup"
USER=dev
RUN_COMMAND="bash .config/setup.sh"

REPO_URL_ROOT="git@github.com:robchrob/dotfiles-bare.git"
BRANCH_ROOT=minimal-root
DOTFILES_DIR_ROOT=".cfg"
BACKUP_DIR_PREFIX_ROOT=".cfg-backup"
TARGET_WORK_TREE_ROOT="/root"
USER_ROOT=root
RUN_COMMAND_ROOT="sh .config/setup.sh"
