# shgittp configuration
# ~/.config/shgittp/config
#
# Hierarchy: CLI flags > [host:job] subsection > [default] > built-in
# Job subsections enable multi-repo: [host:nvim], [host:scripts], etc.

# ── Global defaults ──────────────────────────────
[default]
branch = main
dir = .dotfiles
# repo =
# tree =
# run =

# ── Simple host ──────────────────────────────────
# shgittp my-vps
[my-vps]
repo = git@github.com:user/dotfiles.git
user = admin
run = ./setup.sh

# ── Multi-repo via job subsections ───────────────
# shgittp workstation
[workstation]
repo = git@github.com:user/dotfiles.git
dir = .cfg
branch = main

# Neovim config -> ~/.config/nvim
[workstation:nvim]
repo = git@github.com:user/nvim-config.git
dir = .local/share/nvim-git
tree = .config/nvim

# Scripts -> ~/.local/bin
[workstation:scripts]
repo = git@github.com:user/scripts.git
dir = .local/share/bin-git
tree = .local/bin

# ── Root + user on same host ─────────────────────
# shgittp dev@endpoint
[dev@endpoint]
repo = git@github.com:user/dotfiles.git
branch = minimal
dir = .dot
run = bash .config/setup.sh

[dev@endpoint:root]
repo = git@github.com:user/dotfiles.git
branch = minimal-root
dir = .cfg
tree = /root
user = root
run = sh .config/setup.sh
