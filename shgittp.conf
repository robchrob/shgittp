# shgittp configuration
# ~/.config/shgittp/config
#
# Hierarchy: CLI flags > host section > [default] > built-in
# Suffixes enable multi-repo: repo_nvim, branch_nvim, etc.

# ── Global defaults ──────────────────────────────
[default]
branch = main
dir = .dotfiles
# repo =
# tree =
# run =

# ── Simple host ──────────────────────────────────
# shgittp my-vps
[my-vps]
repo = git@github.com:user/dotfiles.git
user = admin
run = ./setup.sh

# ── Multi-repo via suffixes ──────────────────────
# shgittp workstation
[workstation]
repo = git@github.com:user/dotfiles.git
dir = .cfg
branch = main

# Neovim config -> ~/.config/nvim
repo_nvim = git@github.com:user/nvim-config.git
dir_nvim = .local/share/nvim-git
tree_nvim = .config/nvim

# Scripts -> ~/.local/bin
repo_bin = git@github.com:user/scripts.git
dir_bin = .local/share/bin-git
tree_bin = .local/bin

# ── Root + user on same host ─────────────────────
# shgittp dev@endpoint
[dev@endpoint]
repo = git@github.com:user/dotfiles.git
branch = minimal
dir = .dot
run = bash .config/setup.sh

repo_root = git@github.com:user/dotfiles.git
branch_root = minimal-root
dir_root = .cfg
tree_root = /root
user_root = root
run_root = sh .config/setup.sh
